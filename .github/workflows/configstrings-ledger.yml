name: Configstring Ledger

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ledger-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: pip install pytest
      - name: Validate configstring ledger
        run: pytest tests/test_configstrings_ledger.py -q
