name: Filesystem Search Paths

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  fs-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pytest
      - name: Run filesystem search path tests
        run: pytest tests/test_fs_search_paths.py -q
