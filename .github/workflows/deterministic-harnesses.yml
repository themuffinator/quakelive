name: Deterministic Harnesses

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  harnesses:
    name: Harnesses (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        target: [qvm, dll, re]
        include:
          - target: qvm
            os: ubuntu-latest
            label: QVM
          - target: dll
            os: windows-latest
            label: DLL
          - target: re
            os: ubuntu-latest
            label: Reverse
    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_ROOT: artifacts/tests

    steps:
      - uses: actions/checkout@v4

      - name: Verify QVM toolchain
        if: matrix.target == 'qvm'
        run: tools/ci/verify-qvm-toolchain.sh

      - name: Build clean-room shared objects
        if: matrix.target == 'qvm' || matrix.target == 're'
        run: tools/ci/build-cleanroom.sh

      - name: Install Visual Studio 2010 components
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/install-vs-v100.ps1

      - name: Verify Visual Studio v100 toolset
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/verify-vs-toolchain.ps1 -RequireV100

      - name: Build Win32 gameplay DLLs
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/build-windows-dlls.ps1

      - name: Assert gameplay DLL exports
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/assert-dll-exports.ps1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run deterministic harness suites
        if: matrix.target == 'qvm'
        run: |
          python tests/run_harnesses.py --target ${{ matrix.target }} --artifact-root "${{ env.ARTIFACT_ROOT }}"

      - name: Run deterministic harness suites (Windows)
        if: matrix.target == 'dll'
        shell: pwsh
        run: |
          python tests/run_harnesses.py --target ${{ matrix.target }} --artifact-root "${{ env.ARTIFACT_ROOT }}"

      - name: Run clean-room trace harness
        if: matrix.target == 're'
        run: |
          python tests/run_harnesses.py --target ${{ matrix.target }} --artifact-root "${{ env.ARTIFACT_ROOT }}" --reverse-build-root build/re/linux

      - name: Upload harness artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT_ROOT }}/logs/**/*.log
            ${{ env.ARTIFACT_ROOT }}/match_sim/**/*.json
            ${{ env.ARTIFACT_ROOT }}/client_regression/**/*.json
            ${{ env.ARTIFACT_ROOT }}/trace/**/*.log
            ${{ env.ARTIFACT_ROOT }}/trace/**/*.diff
          if-no-files-found: warn
          retention-days: 7
