name: Deterministic Harnesses

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  harnesses:
    name: Harnesses (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: qvm
            os: ubuntu-latest
            label: QVM
            shell: bash
            python: python
            harness_args: ""
          - target: dll
            os: windows-2019
            label: DLL
            shell: pwsh
            python: python
            harness_args: ""
          - target: re
            os: ubuntu-latest
            label: Reverse
            shell: bash
            python: python
            harness_args: " --reverse-build-root build/re/linux"
    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_ROOT: artifacts/tests

    steps:
      - uses: actions/checkout@v4

      - name: Verify QVM toolchain
        if: matrix.target == 'qvm'
        run: tools/ci/verify-qvm-toolchain.sh

      - name: Build clean-room shared objects
        if: matrix.target == 'qvm' || matrix.target == 're'
        run: tools/ci/build-cleanroom.sh

      - name: Install Visual Studio 2010 components
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/install-vs-v100.ps1

      - name: Verify Visual Studio v100 toolset
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/verify-vs-toolchain.ps1 -RequireV100

      - name: Build Win32 gameplay DLLs
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/build-windows-dlls.ps1

      - name: Assert gameplay DLL exports
        if: matrix.target == 'dll'
        shell: pwsh
        run: tools/ci/assert-dll-exports.ps1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        if: matrix.target == 'dll'
        shell: ${{ matrix.shell }}
        run: ${{ matrix.python }} -m pip install pytest

      - name: Validate default.cfg bootstrap
        if: matrix.target == 'dll'
        shell: ${{ matrix.shell }}
        run: ${{ matrix.python }} -m pytest tests/test_default_cfg_presence.py -vv

      - name: Run deterministic harness suites
        shell: ${{ matrix.shell }}
        run: >-
          ${{ matrix.python }} tests/run_harnesses.py
          --target ${{ matrix.target }}
          --artifact-root "${{ env.ARTIFACT_ROOT }}"${{ matrix.harness_args }}

      - name: Upload harness artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT_ROOT }}/logs/${{ matrix.target }}/**/*.log
            ${{ env.ARTIFACT_ROOT }}/match_sim/${{ matrix.target }}/**/*.json
            ${{ env.ARTIFACT_ROOT }}/client_regression/${{ matrix.target }}/**/*.json
            ${{ env.ARTIFACT_ROOT }}/trace/${{ matrix.target }}/**/*.log
            ${{ env.ARTIFACT_ROOT }}/trace/${{ matrix.target }}/**/*.diff
          if-no-files-found: warn
          retention-days: 7
