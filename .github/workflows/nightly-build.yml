name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Native Windows configuration to build.
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: nightly-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare nightly metadata
    runs-on: ubuntu-latest
    outputs:
      artifact_version: ${{ steps.version.outputs.artifact_version }}
      build_date_utc: ${{ steps.version.outputs.build_date_utc }}
      semver: ${{ steps.version.outputs.semver }}
      short_sha: ${{ steps.version.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve nightly version metadata
        id: version
        run: >-
          python tools/ci/nightly_build.py version
          --repo-root .
          --channel nightly
          --output artifacts/nightly/version.json

      - name: Publish nightly version metadata
        uses: actions/upload-artifact@v4
        with:
          name: nightly-version-metadata
          path: artifacts/nightly/version.json
          if-no-files-found: error
          retention-days: 30

  posix-native:
    name: ${{ matrix.name }}
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux native build
            os: ubuntu-latest
            platform: linux
            artifact_name: linux-native
          - name: macOS native build
            os: macos-latest
            platform: macos
            artifact_name: macos-native

    steps:
      - uses: actions/checkout@v4

      - name: Build native POSIX targets
        env:
          QL_POSIX_PACKAGE_VERSION: ${{ needs.prepare.outputs.artifact_version }}
        run: bash tools/ci/build-posix-native.sh

      - name: Publish ${{ matrix.name }} package
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.artifact_name }}-${{ needs.prepare.outputs.artifact_version }}
          path: build/posix/${{ matrix.platform }}/dist/**
          if-no-files-found: error
          retention-days: 30

  windows-modern:
    name: Windows modern compatibility package
    needs: [prepare]
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      NIGHTLY_CONFIGURATION: ${{ inputs.configuration || 'Release' }}
      NIGHTLY_PLATFORM_TOOLSET: v143
      NIGHTLY_RUNTIME_PROFILE: modern

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download nightly version metadata
        uses: actions/download-artifact@v4
        with:
          name: nightly-version-metadata
          path: artifacts/nightly

      - name: Ensure Visual Studio toolset
        run: |
          pwsh tools/ci/install-vs-toolset.ps1 -PlatformToolset $env:NIGHTLY_PLATFORM_TOOLSET
          pwsh tools/ci/verify-vs-toolchain.ps1 -PlatformToolset $env:NIGHTLY_PLATFORM_TOOLSET -RequireToolset

      - name: Validate native Windows build
        run: >-
          pwsh tools/ci/validate-windows-native.ps1
          -PlatformToolset $env:NIGHTLY_PLATFORM_TOOLSET
          -RuntimeProfile $env:NIGHTLY_RUNTIME_PROFILE
          -Configuration $env:NIGHTLY_CONFIGURATION
          -BuildLogRoot artifacts/nightly/logs
          -DisableOptionalCodecs

      - name: Publish Windows build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-build-logs-${{ needs.prepare.outputs.artifact_version }}
          path: artifacts/nightly/logs/**
          if-no-files-found: warn
          retention-days: 30

      - name: Package nightly build
        id: package
        run: >-
          python tools/ci/nightly_build.py package
          --repo-root .
          --configuration $env:NIGHTLY_CONFIGURATION
          --manifest artifacts/nightly/version.json
          --output-root artifacts/nightly
          --runtime-profile $env:NIGHTLY_RUNTIME_PROFILE
          --toolset $env:NIGHTLY_PLATFORM_TOOLSET

      - name: Write build summary
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Nightly build"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Version: ``${{ needs.prepare.outputs.artifact_version }}``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- SemVer: ``${{ needs.prepare.outputs.semver }}``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Package: ``${{ steps.package.outputs.package_name }}``"

      - name: Publish nightly package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: |
            ${{ steps.package.outputs.package_path }}
            ${{ steps.package.outputs.checksum_path }}
            artifacts/nightly/version.json
            artifacts/nightly/nightly-release-manifest.json
            artifacts/nightly/*-package-manifest.json
          if-no-files-found: error
          retention-days: 30

  assemble-nightly:
    name: Assemble nightly release manifest
    needs: [prepare, posix-native, windows-modern]
    if: ${{ always() && needs.posix-native.result == 'success' && needs.windows-modern.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded

      - name: Restore nightly version metadata
        run: |
          mkdir -p artifacts/nightly
          cp artifacts/downloaded/nightly-version-metadata/version.json artifacts/nightly/version.json

      - name: Assemble release-style nightly manifest
        run: >-
          python tools/ci/nightly_build.py release-manifest
          --repo-root .
          --manifest artifacts/nightly/version.json
          --artifact-root artifacts/downloaded
          --output-root artifacts/nightly

      - name: Publish nightly release manifest
        uses: actions/upload-artifact@v4
        with:
          name: nightly-release-index-${{ needs.prepare.outputs.artifact_version }}
          path: |
            artifacts/nightly/nightly-release-manifest.json
            artifacts/nightly/SHA256SUMS.txt
            artifacts/nightly/version.json
          if-no-files-found: error
          retention-days: 30
