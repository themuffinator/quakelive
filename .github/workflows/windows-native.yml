name: Native DLL (VS2010)

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  native-dll:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      PLATFORM_TOOLSET: v100
    steps:
      - uses: actions/checkout@v4

      - name: Install Visual Studio 2010 components
        run: tools/ci/install-vs-v100.ps1

      - name: Verify Visual Studio v100 toolset
        run: tools/ci/verify-vs-toolchain.ps1 -RequireV100

      - name: Validate project toolsets and Windows payloads
        run: tools/ci/validate-windows-native.ps1 -PlatformToolset $env:PLATFORM_TOOLSET

      - name: Validate gameplay DLL exports
        run: tools/ci/assert-dll-exports.ps1
