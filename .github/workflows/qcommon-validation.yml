name: Qcommon Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/qcommon-validation.yml'
      - 'tests/compiler_support.py'
      - 'tests/cm_collision_harness.c'
      - 'tests/fs_searchpath_harness.c'
      - 'tests/vm_fallback_harness.c'
      - 'tests/test_cvar_parity.py'
      - 'tests/test_cvar_alias_console.py'
      - 'tests/test_fs_search_paths.py'
      - 'tests/test_qcommon_collision_leaf_parity.py'
      - 'tests/test_qcommon_collision_load_parity.py'
      - 'tests/test_qcommon_vm_fallback_parity.py'
      - 'tests/test_playerstate_replication.py'
      - 'tests/test_client_config_parity.py'
      - 'tests/test_platform_services.py'
      - 'tests/test_cgame_event_transport_parity.py'
      - 'tests/test_qcommon_full_parity_gate.py'
      - 'tools/qcommon/run_qcommon_runtime_probe.ps1'
      - 'artifacts/qcommon_validation/**'
      - 'docs/build-pipeline.md'
      - 'docs/windows-native-pipeline.md'
      - 'docs/reverse-engineering/qcommon-collision-leaf-ownership-2026-04-10.md'
      - 'docs/reverse-engineering/qcommon-full-parity-audit-and-implementation-plan-2026-04-10.md'
      - 'docs/reverse-engineering/qcommon-validation-and-runtime-evidence-2026-04-10.md'
      - 'docs/reverse-engineering/qcommon-vm-fallback-ownership-2026-04-10.md'
      - 'AUDIT.md'
      - 'IMPLEMENTATION_PLAN.md'
      - 'src/code/qcommon/**'
      - 'src/code/game/q_shared.c'
      - 'src/code/game/q_shared.h'
      - 'src/code/game/g_legacy_cvars.h'
      - 'src/code/client/**'
      - 'src/code/server/sv_init.c'
      - 'src/common/platform/platform_steamworks.c'
      - 'src/common/platform/platform_steamworks.h'
  pull_request:
    paths:
      - '.github/workflows/qcommon-validation.yml'
      - 'tests/compiler_support.py'
      - 'tests/cm_collision_harness.c'
      - 'tests/fs_searchpath_harness.c'
      - 'tests/vm_fallback_harness.c'
      - 'tests/test_cvar_parity.py'
      - 'tests/test_cvar_alias_console.py'
      - 'tests/test_fs_search_paths.py'
      - 'tests/test_qcommon_collision_leaf_parity.py'
      - 'tests/test_qcommon_collision_load_parity.py'
      - 'tests/test_qcommon_vm_fallback_parity.py'
      - 'tests/test_playerstate_replication.py'
      - 'tests/test_client_config_parity.py'
      - 'tests/test_platform_services.py'
      - 'tests/test_cgame_event_transport_parity.py'
      - 'tests/test_qcommon_full_parity_gate.py'
      - 'tools/qcommon/run_qcommon_runtime_probe.ps1'
      - 'artifacts/qcommon_validation/**'
      - 'docs/build-pipeline.md'
      - 'docs/windows-native-pipeline.md'
      - 'docs/reverse-engineering/qcommon-collision-leaf-ownership-2026-04-10.md'
      - 'docs/reverse-engineering/qcommon-full-parity-audit-and-implementation-plan-2026-04-10.md'
      - 'docs/reverse-engineering/qcommon-validation-and-runtime-evidence-2026-04-10.md'
      - 'docs/reverse-engineering/qcommon-vm-fallback-ownership-2026-04-10.md'
      - 'AUDIT.md'
      - 'IMPLEMENTATION_PLAN.md'
      - 'src/code/qcommon/**'
      - 'src/code/game/q_shared.c'
      - 'src/code/game/q_shared.h'
      - 'src/code/game/g_legacy_cvars.h'
      - 'src/code/client/**'
      - 'src/code/server/sv_init.c'
      - 'src/common/platform/platform_steamworks.c'
      - 'src/common/platform/platform_steamworks.h'

jobs:
  qcommon-validation:
    runs-on: windows-latest
    env:
      QCOMMON_VALIDATION_ROOT: artifacts/qcommon_validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run qcommon parity tests
        run: |
          pytest tests/test_cvar_parity.py tests/test_cvar_alias_console.py tests/test_fs_search_paths.py tests/test_qcommon_collision_leaf_parity.py tests/test_qcommon_collision_load_parity.py tests/test_qcommon_vm_fallback_parity.py tests/test_playerstate_replication.py tests/test_client_config_parity.py tests/test_platform_services.py tests/test_cgame_event_transport_parity.py tests/test_qcommon_full_parity_gate.py -q

      - name: Upload qcommon artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qcommon-validation
          path: |
            ${{ env.QCOMMON_VALIDATION_ROOT }}/**
          if-no-files-found: warn
          retention-days: 7
